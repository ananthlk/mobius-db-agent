service: credentialing
permissions:
  chat:
    read:
      # Credentialing run state (orchestrator)
      - credentialing_runs
      # Org profile (migration 012)
      - org_profile
      - org_locations
      # Provider roster uploads + members
      - roster_uploads
      - roster_upload_members
      # Reconciliation
      - roster_reconciliation_provider
      - validation_result
      - api_envelope
      - reconciliation_report
      - provider_audit_log
      - provider_match_rules
      # Truth + snooze
      - roster_truth
      - roster_snooze
      # Summaries
      - org_summary
      - compliance_findings
      # Task feed + migrations
      - mobius_task
      - migrations_applied
    write:
      - org_profile
      - org_locations
      - roster_uploads
      - roster_upload_members
      - roster_reconciliation_provider
      - validation_result
      - api_envelope
      - reconciliation_report
      - provider_audit_log
      - provider_match_rules
      - roster_truth
      - roster_snooze
      - org_summary
      - compliance_findings
      - mobius_task
      - migrations_applied
limits:
  max_rows: 10000
  timeout_seconds: 30
